apiVersion: actions.summerwind.dev/v1alpha1
kind: RunnerDeployment
metadata:
  name: dreamai-runner
  namespace: github-runner
spec:
  replicas: 2
  template:
    spec:
      # org 级别 runner（所有 repo 共用）
      organization: surmdren
      # 或者指定单个 repo:
      # repository: surmdren/infra

      image: ghcr.io/actions/actions-runner:latest

      labels:
        - self-hosted
        - linux
        - x64
        - kind

      resources:
        requests:
          cpu: "500m"
          memory: "512Mi"
        limits:
          cpu: "2000m"
          memory: "4Gi"

      # Kind 环境需要特权模式才能运行 Docker-in-Docker
      dockerEnabled: true
      dockerMTU: 1450

      # 特权模式（Kind 需要）
      securityContext:
        privileged: true

      env: []
