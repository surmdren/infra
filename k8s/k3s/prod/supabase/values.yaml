# ─── 环境变量配置 ──────────────────────────────────────
environment:
  kong:
    KONG_DATABASE: "off"
    KONG_DECLARATIVE_CONFIG: "/usr/local/kong/kong.yml"

  auth:
    API_EXTERNAL_URL: "https://supabase.dreamwiseai.com"
    GOTRUE_SITE_URL: "https://supabase.dreamwiseai.com"
    GOTRUE_URI_ALLOW_LIST: "*"
    GOTRUE_DISABLE_SIGNUP: "false"
    GOTRUE_JWT_EXPIRY: "3600"
    GOTRUE_EXTERNAL_EMAIL_ENABLED: "true"
    GOTRUE_MAILER_AUTOCONFIRM: "false"
    GOTRUE_SMTP_ADMIN_EMAIL: "noreply@dreamwiseai.com"
    GOTRUE_SMTP_HOST: "smtp.resend.com"
    GOTRUE_SMTP_PORT: "587"
    GOTRUE_SMTP_SENDER_NAME: "DreamAI"

  studio:
    STUDIO_DEFAULT_ORGANIZATION: "DreamAI"
    STUDIO_DEFAULT_PROJECT: "DreamAI Platform"
    SUPABASE_PUBLIC_URL: "https://supabase.dreamwiseai.com"
    NEXT_PUBLIC_ENABLE_LOGS: "true"

  rest:
    PGRST_DB_SCHEMAS: "public,storage,graphql_public"
    PGRST_DB_ANON_ROLE: "anon"
    PGRST_DB_USE_LEGACY_GUCS: "false"
    PGRST_APP_SETTINGS_JWT_EXP: "3600"

  realtime:
    PORT: "4000"
    DB_SSL: "false"
    DNS_NODES: "''"
    RLIMIT_NOFILE: "10000"

  storage:
    STORAGE_BACKEND: "s3"
    GLOBAL_S3_BUCKET: "supabase-storage"
    GLOBAL_S3_ENDPOINT: "http://supabase-minio:9000"
    GLOBAL_S3_FORCE_PATH_STYLE: "true"
    GLOBAL_S3_PROTOCOL: "http"
    REGION: "local"
    IMGPROXY_URL: "http://supabase-imgproxy:5001"
    FILE_SIZE_LIMIT: "52428800"

  db:
    POSTGRES_HOST: "/var/run/postgresql"
    POSTGRES_PORT: "5432"
    POSTGRES_DB: "postgres"
    PGDATA: "/var/lib/postgresql/data"
    JWT_EXP: "3600"

  analytics:
    LOGFLARE_SUPABASE_MODE: "true"
    LOGFLARE_MIN_CLUSTER_SIZE: "1"

# ─── 持久化存储（k3s local-path provisioner 动态分配）──
persistence:
  db:
    enabled: true
    storageClassName: "local-path"
    size: 50Gi
    accessModes:
      - ReadWriteOnce

  storage:
    enabled: true
    storageClassName: "local-path"
    size: 100Gi
    accessModes:
      - ReadWriteOnce

  minio:
    enabled: true
    storageClassName: "local-path"
    size: 100Gi
    accessModes:
      - ReadWriteOnce

# ─── Ingress（Traefik）────────────────────────────────
ingress:
  enabled: true
  className: "traefik"
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: "web,websecure"
  tls: []

# ─── Studio ────────────────────────────────────────────
studio:
  enabled: true

