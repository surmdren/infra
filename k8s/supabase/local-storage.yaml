# 本地存储配置
# 为 Supabase 各组件提供 hostPath 持久化存储

---
# StorageClass
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: local-storage
provisioner: kubernetes.io/no-provisioner
volumeBindingMode: WaitForFirstConsumer
reclaimPolicy: Retain

---
# PostgreSQL 数据目录
apiVersion: v1
kind: PersistentVolume
metadata:
  name: supabase-db-pv
  labels:
    app: supabase-db
spec:
  capacity:
    storage: 20Gi
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: local-storage
  hostPath:
    path: /home/ysurmd/data/supabase/db
    type: DirectoryOrCreate

---
# Storage (文件存储) 数据目录
apiVersion: v1
kind: PersistentVolume
metadata:
  name: supabase-storage-pv
  labels:
    app: supabase-storage
spec:
  capacity:
    storage: 20Gi
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: local-storage
  hostPath:
    path: /home/ysurmd/data/supabase/storage
    type: DirectoryOrCreate

---
# MinIO (S3兼容存储) 数据目录
apiVersion: v1
kind: PersistentVolume
metadata:
  name: supabase-minio-pv
  labels:
    app: supabase-minio
spec:
  capacity:
    storage: 20Gi
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: local-storage
  hostPath:
    path: /home/ysurmd/data/supabase/minio
    type: DirectoryOrCreate
