apiVersion: v1
kind: Namespace
metadata:
  name: aicofounder-dev
---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: quota
  namespace: aicofounder-dev
spec:
  hard:
    requests.cpu: "500m"
    requests.memory: 512Mi
    limits.cpu: "1"
    limits.memory: 1Gi
    pods: "5"
---
apiVersion: v1
kind: LimitRange
metadata:
  name: limits
  namespace: aicofounder-dev
spec:
  limits:
    - type: Container
      default:
        cpu: "500m"
        memory: "512Mi"
      defaultRequest:
        cpu: "100m"
        memory: "256Mi"
