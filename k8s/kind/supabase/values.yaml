# ─── 环境变量配置 ──────────────────────────────────────
environment:
  kong:
    KONG_DATABASE: "off"
    KONG_DECLARATIVE_CONFIG: "/usr/local/kong/kong.yml"

  auth:
    API_EXTERNAL_URL: "https://supabase.dreamwiseai.com"
    GOTRUE_SITE_URL: "https://supabase.dreamwiseai.com"
    GOTRUE_URI_ALLOW_LIST: "*"
    GOTRUE_DISABLE_SIGNUP: "false"
    GOTRUE_JWT_EXPIRY: "3600"
    GOTRUE_EXTERNAL_EMAIL_ENABLED: "true"
    GOTRUE_MAILER_AUTOCONFIRM: "true"  # 本地开发，关闭邮件验证
    GOTRUE_SMTP_ADMIN_EMAIL: "admin@dreamwiseai.com"
    GOTRUE_SMTP_HOST: ""
    GOTRUE_SMTP_PORT: "587"
    GOTRUE_SMTP_SENDER_NAME: "DreamAI"

  studio:
    STUDIO_DEFAULT_ORGANIZATION: "DreamAI"
    STUDIO_DEFAULT_PROJECT: "DreamAI Platform"
    SUPABASE_PUBLIC_URL: "https://supabase.dreamwiseai.com"
    NEXT_PUBLIC_ENABLE_LOGS: "true"

  rest:
    PGRST_DB_SCHEMAS: "public,storage,graphql_public"
    PGRST_DB_ANON_ROLE: "anon"
    PGRST_DB_USE_LEGACY_GUCS: "false"
    PGRST_APP_SETTINGS_JWT_EXP: "3600"

  realtime:
    PORT: "4000"
    DB_SSL: "false"
    DNS_NODES: "''"
    RLIMIT_NOFILE: "10000"

  storage:
    STORAGE_BACKEND: "s3"
    GLOBAL_S3_BUCKET: "supabase-storage"
    GLOBAL_S3_ENDPOINT: "http://supabase-minio:9000"
    GLOBAL_S3_FORCE_PATH_STYLE: "true"
    GLOBAL_S3_PROTOCOL: "http"
    REGION: "local"
    IMGPROXY_URL: "http://supabase-imgproxy:5001"
    FILE_SIZE_LIMIT: "52428800"  # 50MB

  db:
    POSTGRES_HOST: "/var/run/postgresql"
    POSTGRES_PORT: "5432"
    POSTGRES_DB: "postgres"
    PGDATA: "/var/lib/postgresql/data"
    JWT_EXP: "3600"

  analytics:
    LOGFLARE_SUPABASE_MODE: "true"
    LOGFLARE_MIN_CLUSTER_SIZE: "1"

# ─── 持久化存储（本地存储）─────────────────────────────
persistence:
  db:
    enabled: true
    storageClassName: "local-storage"
    size: 20Gi
    accessModes:
      - ReadWriteOnce

  storage:
    enabled: true
    storageClassName: "local-storage"
    size: 20Gi
    accessModes:
      - ReadWriteOnce

  minio:
    enabled: true
    storageClassName: "local-storage"
    size: 20Gi
    accessModes:
      - ReadWriteOnce

# ─── Ingress ──────────────────────────────────────────
ingress:
  enabled: true
  className: "nginx"
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "300"
  tls: []  # Cloudflare Tunnel 处理 TLS，这里不需要

# ─── Studio (Dashboard) ────────────────────────────────
studio:
  enabled: true

# ─── 资源限制（本地集群适量分配）─────────────────────────
deployment:
  db:
    resources:
      requests:
        memory: "512Mi"
        cpu: "250m"
      limits:
        memory: "2Gi"
        cpu: "1000m"

  auth:
    resources:
      requests:
        memory: "128Mi"
        cpu: "100m"
      limits:
        memory: "256Mi"
        cpu: "200m"

  rest:
    resources:
      requests:
        memory: "128Mi"
        cpu: "100m"
      limits:
        memory: "256Mi"
        cpu: "200m"

  realtime:
    resources:
      requests:
        memory: "128Mi"
        cpu: "100m"
      limits:
        memory: "256Mi"
        cpu: "200m"

  storage:
    resources:
      requests:
        memory: "128Mi"
        cpu: "100m"
      limits:
        memory: "256Mi"
        cpu: "200m"

  studio:
