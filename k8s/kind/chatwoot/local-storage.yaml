# Chatwoot 本地存储配置
# 为 PostgreSQL 和 Redis 提供 hostPath 持久化存储

---
# StorageClass
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: chatwoot-storage
provisioner: kubernetes.io/no-provisioner
volumeBindingMode: WaitForFirstConsumer
reclaimPolicy: Retain

---
# PostgreSQL 数据目录
apiVersion: v1
kind: PersistentVolume
metadata:
  name: chatwoot-postgresql-pv
  labels:
    app: chatwoot-postgresql
spec:
  capacity:
    storage: 10Gi
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: chatwoot-storage
  hostPath:
    path: /home/ysurmd/data/chatwoot/postgresql
    type: DirectoryOrCreate

---
# Redis 数据目录
apiVersion: v1
kind: PersistentVolume
metadata:
  name: chatwoot-redis-pv
  labels:
    app: chatwoot-redis
spec:
  capacity:
    storage: 5Gi
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: chatwoot-storage
  hostPath:
    path: /home/ysurmd/data/chatwoot/redis
    type: DirectoryOrCreate
