# Supabase Namespace - Resource Quota & LimitRange (生产)
# 服务器: 62GB RAM，生产级配额

---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: supabase-quota
  namespace: supabase
spec:
  hard:
    requests.cpu: "2"
    requests.memory: "3Gi"
    limits.cpu: "16"
    limits.memory: "24Gi"
    pods: "40"
    persistentvolumeclaims: "10"

---
apiVersion: v1
kind: LimitRange
metadata:
  name: supabase-limitrange
  namespace: supabase
spec:
  limits:
    - type: Container
      default:
        cpu: "500m"
        memory: "512Mi"
      defaultRequest:
        cpu: "100m"
        memory: "128Mi"
      max:
        cpu: "4"
        memory: "8Gi"
      min:
        cpu: "10m"
        memory: "32Mi"
    - type: PersistentVolumeClaim
      max:
        storage: "200Gi"
      min:
        storage: "1Gi"
