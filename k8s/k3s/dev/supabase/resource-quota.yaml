# Supabase Namespace - Resource Quota & LimitRange
# 总配额：8 CPU / 12Gi 内存（单节点 4C16G，留余量给系统和其他服务）

---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: supabase-quota
  namespace: supabase
spec:
  hard:
    requests.cpu: "4"
    requests.memory: "6Gi"
    limits.cpu: "8"
    limits.memory: "12Gi"
    pods: "30"
    persistentvolumeclaims: "10"

---
# LimitRange：为没有显式设置 requests/limits 的容器设置默认值
apiVersion: v1
kind: LimitRange
metadata:
  name: supabase-limitrange
  namespace: supabase
spec:
  limits:
    - type: Container
      default:
        cpu: "500m"
        memory: "512Mi"
      defaultRequest:
        cpu: "100m"
        memory: "128Mi"
      max:
        cpu: "2"
        memory: "4Gi"
      min:
        cpu: "50m"
        memory: "64Mi"
    - type: PersistentVolumeClaim
      max:
        storage: "50Gi"
      min:
        storage: "1Gi"
