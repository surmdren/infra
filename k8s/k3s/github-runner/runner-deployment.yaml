apiVersion: actions.summerwind.dev/v1alpha1
kind: RunnerDeployment
metadata:
  name: dreamai-runner
  namespace: github-runner
spec:
  replicas: 2  # 同时运行 2 个 runner
  template:
    spec:
      # 替换为你的 GitHub org 或 repo
      # org 级别 runner（推荐，所有 repo 共用）
      organization: surmdren
      # 或者 repo 级别 runner:
      # repository: surmdren/infra

      image: ghcr.io/actions/actions-runner:latest

      # runner 标签，workflow 里用 runs-on: self-hosted 或指定标签
      labels:
        - self-hosted
        - linux
        - x64
        - k3s

      # 资源限制
      resources:
        requests:
          cpu: "500m"
          memory: "512Mi"
        limits:
          cpu: "2000m"
          memory: "4Gi"

      # 挂载 Docker socket（用于 docker build）
      dockerEnabled: true
      dockerMTU: 1450

      # 工作目录大小
      ephemeralContainers: []

      # 环境变量
      env: []

      # 节点选择（可选）
      # nodeSelector:
      #   role: runner
