# Supabase Service - NodePort 方式
# Cloudflare Tunnel 直接连接 NodePort，不需要 nginx-ingress

---
# Kong API Gateway - NodePort
apiVersion: v1
kind: Service
metadata:
  name: supabase-kong-nodeport
  namespace: supabase
  labels:
    app: supabase-kong
spec:
  type: NodePort
  selector:
    app: supabase-kong
  ports:
    - name: http
      port: 8000
      targetPort: 8000
      nodePort: 30800   # 对外端口：http://localhost:30800
    - name: https
      port: 8443
      targetPort: 8443
      nodePort: 30843

---
# Studio 管理界面 - NodePort
apiVersion: v1
kind: Service
metadata:
  name: supabase-studio-nodeport
  namespace: supabase
  labels:
    app: supabase-studio
spec:
  type: NodePort
  selector:
    app: supabase-studio
  ports:
    - name: http
      port: 3000
      targetPort: 3000
      nodePort: 30300   # 对外端口：http://localhost:30300

---
# Cloudflare Tunnel 部署
# 连接方式：Cloudflare → NodePort 30800 (Kong)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cloudflared
  namespace: supabase
  labels:
    app: cloudflared
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cloudflared
  template:
    metadata:
      labels:
        app: cloudflared
    spec:
      containers:
        - name: cloudflared
          image: cloudflare/cloudflared:latest
          args:
            - tunnel
            - --no-autoupdate
            - run
            - --token
            - $(TUNNEL_TOKEN)
          env:
            - name: TUNNEL_TOKEN
              valueFrom:
                secretKeyRef:
                  name: cloudflared-secret
                  key: token
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "100m"

---
# Cloudflare Tunnel Token Secret
# 从 Cloudflare Dashboard → Zero Trust → Tunnels 获取
apiVersion: v1
kind: Secret
metadata:
  name: cloudflared-secret
  namespace: supabase
type: Opaque
stringData:
  token: "YOUR_CLOUDFLARE_TUNNEL_TOKEN_HERE"
